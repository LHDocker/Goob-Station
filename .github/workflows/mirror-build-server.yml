name: mirror-build-server

on:
  schedule:
    - cron: '0 8 * * *'   # nightly 08:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: mirror-build-server
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout upstream Goob master (+ engine submodules)
        uses: actions/checkout@v4
        with:
          repository: Goob-Station/Goob-Station
          ref: master
          submodules: recursive
          fetch-depth: 1

      - name: Resolve upstream version
        id: ver
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "tag=server-$(date -u +%Y.%m.%d)-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Skip if this commit was already released
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.ver.outputs.tag }}" -R "${{ github.repository }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.ver.outputs.tag }} already exists - skipping build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET 9
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build & package server (linux-x64)
        if: steps.check.outputs.exists == 'false'
        run: |
          set -e
          dotnet restore
          dotnet build Content.Packaging --configuration Release --no-restore /m
          dotnet run --project Content.Packaging server --platform linux-x64

      - name: List build output
        if: steps.check.outputs.exists == 'false'
        run: |
          echo "--- release/ ---"; ls -la release/ 2>/dev/null || true

      - name: Publish GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          f=$(ls release/*.zip | head -1)
          echo "Artifact: $f"
          gh release create "${{ steps.ver.outputs.tag }}" \
            -R "${{ github.repository }}" \
            -t "Goob server ${{ steps.ver.outputs.tag }}" \
            -n "Automated server build of upstream Goob-Station@${{ steps.ver.outputs.sha }} ($(date -u +'%Y-%m-%d %H:%M UTC'))" \
            --latest \
            "$f"

      - name: Mirror fork master from upstream (cosmetic, best-effort)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST "repos/${{ github.repository }}/merge-upstream" -f branch=master \
            && echo "fork master synced to upstream" \
            || echo "mirror sync skipped (releases still track upstream regardless)"
